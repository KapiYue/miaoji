    <article class="document"><h1>妙记支持</h1>
<p>如需帮助，请发送邮件至 <a href="mailto:zdjoey@126.com">zdjoey@126.com</a>，并尽量包含：</p>
<ul><li>妙记版本号和构建号；</li><li>iPhone 型号和 iOS 版本；</li><li>问题出现的步骤和错误提示；</li><li>可公开分享的截图（请先遮盖金额、邮箱和其他个人信息）。</li></ul>
<p>请勿发送邮箱验证码、登录令牌、银行卡完整号码或未脱敏账本。</p>
<p>账号删除可直接在应用内完成：打开“设置”，在“云同步”中选择“永久删除账号与数据”。</p></article>

server {
    listen 80;
    listen [::]:80;
    server_name miaoji.joy-coder.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name miaoji.joy-coder.com;

    root /var/www/miaoji;
    index index.html;
    server_tokens off;

    ssl_certificate /etc/nginx/ssl/miaoji/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/miaoji/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:MIAOJI_SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri.html =404;
    }
}
